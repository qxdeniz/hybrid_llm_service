version: '3.8'

services:
  # Ollama сервис для локального режима - запускается ТОЛЬКО с профилем 'local'
  ollama:
    image: ollama/ollama:latest
    container_name: mts-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    entrypoint: >
      sh -c "
      ollama serve &
      sleep 15
      echo 'Ollama started, pulling qwen:8b model...'
      ollama pull qwen:8b
      echo 'Model loaded successfully'
      wait
      "

  # LLM API сервис для локального режима (с Ollama)
  llm-api-local:
    build:
      context: ./llm_service
      dockerfile: Dockerfile
    container_name: mts-llm-api
    ports:
      - "${LLM_SERVICE_PORT:-8000}:8000"
    environment:
      - MODE=local
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen:8b}
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo}
      - CUSTOM_BASE_URL=${CUSTOM_BASE_URL:-https://api.openai.com/v1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./llm_module:/app/llm_module
      - ./llm_service:/app
    command: /app/entrypoint.sh
    networks:
      - llm-network
    profiles:
      - local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LLM API сервис для удаленного режима (OpenAI API, БЕЗ Ollama)
  llm-api-remote:
    build:
      context: ./llm_service
      dockerfile: Dockerfile
    container_name: mts-llm-api
    ports:
      - "${LLM_SERVICE_PORT:-8000}:8000"
    environment:
      - MODE=remote
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen:8b}
      - OLLAMA_BASE_URL=
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4-turbo}
      - CUSTOM_BASE_URL=${CUSTOM_BASE_URL:-https://api.openai.com/v1}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./llm_module:/app/llm_module
      - ./llm_service:/app
    command: /app/entrypoint.sh
    networks:
      - llm-network
    profiles:
      - remote
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  llm-network:
    driver: bridge

volumes:
  ollama-data:
    driver: local
